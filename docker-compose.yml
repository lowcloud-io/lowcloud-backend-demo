version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: lowcloud-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lowcloud-network

  postgres:
    image: postgres:18-alpine
    container_name: lowcloud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-lowcloud_db}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lowcloud-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lowcloud-backend
    restart: unless-stopped
    environment:
      # Server Configuration
      PORT: ${PORT:-3000}
      NODE_ENV: ${NODE_ENV:-production}

      # Database Configuration (im Docker-Netzwerk)
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-lowcloud_db}
      POSTGRES_HOST: postgres # Service-Name im Docker-Netzwerk
      POSTGRES_PORT: 5432 # Interner Port (nicht 5433!)
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-lowcloud_db}

      # Migrations (nur bei Docker Compose ausführen)
      RUN_MIGRATIONS: "true"

      # CORS Configuration (optional)
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}

      # Redis Configuration
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-200}
      RATE_LIMIT_WRITE_MAX: ${RATE_LIMIT_WRITE_MAX:-30}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lowcloud-network

networks:
  lowcloud-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
